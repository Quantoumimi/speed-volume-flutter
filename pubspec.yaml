name: speed_volume
description: GPS速度控制蓝牙音箱音量的Android应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^11.0.0        # GPS定位
  permission_handler: ^11.3.0 # 权限管理
  volume_controller: ^2.0.6   # 系统音量控制
  audioplayers: ^6.0.0        # 音频播放

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
